services:
  # ── Flask API backend ────────────────────────────────────────────────────
  - type: web
    name: smileberta-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0

  # ── Static frontend ──────────────────────────────────────────────────────
  - type: static_site
    name: smileberta-web
    buildCommand: ""
    staticPublishPath: .
    pullRequestPreviewsEnabled: false
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
