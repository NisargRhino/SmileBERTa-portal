services:
  # ── Flask API backend ────────────────────────────────────────────────────
  - type: web
    name: smileberta-api
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile

  # ── Static frontend ──────────────────────────────────────────────────────
  - type: static_site
    name: smileberta-web
    buildCommand: ""
    staticPublishPath: frontend
    pullRequestPreviewsEnabled: false
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
