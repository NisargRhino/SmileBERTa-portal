<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — SmileBERTa</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --blue: #0071e3;
            --blue-hover: #0077ed;
            --bg: #000;
            --card: #1c1c1e;
            --border: rgba(255,255,255,0.1);
            --text: #f5f5f7;
            --muted: #86868b;
            --error: #ff453a;
            --success: #34c759;
            --font: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        nav {
            position: sticky;
            top: 0;
            z-index: 9800;
            background: rgba(0,0,0,0.82);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid var(--border);
        }

        .nav-inner {
            max-width: 1080px;
            margin: 0 auto;
            height: 64px;
            display: flex;
            align-items: center;
            padding: 0 24px;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            text-decoration: none;
        }

        .nav-brand img {
            height: 56px;
            width: auto;
        }

        .page {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
            background-image: url('https://images.unsplash.com/photo-1614935151651-0bea6508db6b?w=1920&q=80');
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .page::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.72);
        }

        .card {
            position: relative;
            z-index: 1;
            background: rgba(28,28,30,0.95);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 44px 40px;
            width: 100%;
            max-width: 400px;
        }

        .card-logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .card-logo img { display: block; margin: 0 auto 12px; }

        .card-logo p {
            font-size: 0.82rem;
            color: var(--muted);
            margin-top: 6px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            background: #2c2c2e;
            border-radius: 10px;
            padding: 3px;
            margin-bottom: 28px;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            color: var(--muted);
            transition: all 0.2s;
            user-select: none;
        }

        .tab.active {
            background: var(--card);
            color: var(--text);
            box-shadow: 0 1px 4px rgba(0,0,0,0.4);
        }

        /* Forms */
        .form { display: none; }
        .form.active { display: block; }

        .field { margin-bottom: 18px; }

        label {
            display: block;
            font-size: 0.78rem;
            font-weight: 500;
            color: var(--muted);
            margin-bottom: 7px;
            letter-spacing: 0.02em;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            background: #2c2c2e;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 12px;
            color: var(--text);
            font-size: 0.95rem;
            font-family: var(--font);
            padding: 13px 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus { border-color: var(--blue); }
        input::placeholder { color: #555; }

        .btn-submit {
            width: 100%;
            background: var(--blue);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            padding: 14px;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s;
            font-family: var(--font);
            margin-top: 6px;
        }

        .btn-submit:hover { background: var(--blue-hover); transform: translateY(-1px); }
        .btn-submit:active { transform: none; }

        .msg {
            font-size: 0.83rem;
            text-align: center;
            padding: 10px 14px;
            border-radius: 10px;
            margin-top: 14px;
            display: none;
        }

        .msg.error  { background: rgba(255,69,58,0.15);  color: var(--error);   border: 1px solid rgba(255,69,58,0.3);  display: block; }
        .msg.success{ background: rgba(52,199,89,0.15);  color: var(--success); border: 1px solid rgba(52,199,89,0.3);  display: block; }

        .hint {
            text-align: center;
            font-size: 0.78rem;
            color: var(--muted);
            margin-top: 20px;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <nav>
        <div class="nav-inner">
            <a href="index.html" class="nav-brand"><img src="smileberta.png" alt="SmileBERTa"></a>
        </div>
    </nav>

    <div class="page">
        <div class="card">
            <div class="card-logo">
                <img src="smileberta.png" alt="SmileBERTa" style="height:120px;width:auto;margin-bottom:12px;">
                <p>AI-powered drug discovery platform</p>
            </div>

            <div class="tabs">
                <div class="tab active" id="tab-login" onclick="switchTab('login')">Sign In</div>
                <div class="tab" id="tab-register" onclick="switchTab('register')">Create Account</div>
            </div>

            <!-- LOGIN -->
            <div class="form active" id="form-login">
                <div class="field">
                    <label>Username</label>
                    <input type="text" id="login-username" placeholder="Enter your username" autocomplete="username">
                </div>
                <div class="field">
                    <label>Password</label>
                    <input type="password" id="login-password" placeholder="Enter your password" autocomplete="current-password">
                </div>
                <button class="btn-submit" id="btn-login" onclick="doLogin()">Sign In</button>
                <div class="msg" id="login-msg"></div>
                <p class="hint">Don't have an account? <a href="#" onclick="switchTab('register'); return false;" style="color:var(--blue);">Create one</a></p>
            </div>

            <!-- REGISTER -->
            <div class="form" id="form-register">
                <div class="field">
                    <label>Username</label>
                    <input type="text" id="reg-username" placeholder="Choose a username (min 3 chars)" autocomplete="username">
                </div>
                <div class="field">
                    <label>Password</label>
                    <input type="password" id="reg-password" placeholder="Choose a password (min 6 chars)" autocomplete="new-password">
                </div>
                <div class="field">
                    <label>Confirm Password</label>
                    <input type="password" id="reg-confirm" placeholder="Repeat your password" autocomplete="new-password">
                </div>
                <button class="btn-submit" id="btn-register" onclick="doRegister()">Create Account</button>
                <div class="msg" id="reg-msg"></div>
                <p class="hint">Already have an account? <a href="#" onclick="switchTab('login'); return false;" style="color:var(--blue);">Sign in</a></p>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        const API = 'https://smileberta-api.onrender.com';

        // Redirect if already logged in
        if (isLoggedIn()) window.location.href = 'index.html';

        function switchTab(tab) {
            document.getElementById('form-login').classList.toggle('active', tab === 'login');
            document.getElementById('form-register').classList.toggle('active', tab === 'register');
            document.getElementById('tab-login').classList.toggle('active', tab === 'login');
            document.getElementById('tab-register').classList.toggle('active', tab === 'register');
            document.getElementById('login-msg').className = 'msg';
            document.getElementById('reg-msg').className = 'msg';
        }

        function setMsg(id, text, type) {
            const el = document.getElementById(id);
            el.textContent = text;
            el.className = 'msg ' + type;
        }

        function setLoading(btnId, loading) {
            const btn = document.getElementById(btnId);
            if (loading) {
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner"></span>Loading…';
            } else {
                btn.disabled = false;
                btn.textContent = btnId === 'btn-login' ? 'Sign In' : 'Create Account';
            }
        }

        async function doLogin() {
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value;
            if (!username || !password) { setMsg('login-msg', 'Please fill in all fields.', 'error'); return; }
            setLoading('btn-login', true);
            try {
                const res = await fetch(API + '/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (!res.ok) { setMsg('login-msg', data.error || 'Login failed.', 'error'); return; }
                localStorage.setItem('auth_token', data.token);
                localStorage.setItem('auth_username', data.username);
                window.location.href = 'index.html';
            } catch {
                setMsg('login-msg', 'Network error. Please try again.', 'error');
            } finally {
                setLoading('btn-login', false);
            }
        }

        async function doRegister() {
            const username = document.getElementById('reg-username').value.trim();
            const password = document.getElementById('reg-password').value;
            const confirm  = document.getElementById('reg-confirm').value;
            if (!username || !password) { setMsg('reg-msg', 'Please fill in all fields.', 'error'); return; }
            if (password !== confirm)   { setMsg('reg-msg', 'Passwords do not match.', 'error'); return; }
            setLoading('btn-register', true);
            try {
                const res = await fetch(API + '/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (!res.ok) { setMsg('reg-msg', data.error || 'Registration failed.', 'error'); return; }
                setMsg('reg-msg', 'Account created! Signing you in…', 'success');
                // Auto-login
                setTimeout(() => {
                    document.getElementById('login-username').value = username;
                    document.getElementById('login-password').value = password;
                    switchTab('login');
                    doLogin();
                }, 900);
            } catch {
                setMsg('reg-msg', 'Network error. Please try again.', 'error');
            } finally {
                setLoading('btn-register', false);
            }
        }

        // Enter key support
        document.addEventListener('keydown', e => {
            if (e.key === 'Enter') {
                const activeForm = document.querySelector('.form.active');
                if (activeForm.id === 'form-login') doLogin();
                else doRegister();
            }
        });
    </script>
</body>
</html>
